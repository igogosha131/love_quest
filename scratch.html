<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Скретч-карта</title>
  <style>
    :root { 
      --accent: #e83e8c; 
      --text: #333; 
      --card: #fff; 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #f8f9fa;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/background.jpg');
      background-size: cover;
      opacity: 0.12;
      z-index: -1;
    }

    .container { 
      background: var(--card); 
      padding: 2rem 1.5rem; 
      border-radius: 20px; 
      box-shadow: 0 8px 30px rgba(0,0,0,0.1); 
      max-width: 460px; 
      width: 100%; 
      text-align: center; 
    }

    h1 { 
      font-size: 1.85rem; 
      color: var(--accent); 
      margin-bottom: 0.8rem; 
    }

    canvas {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .error { color: #d32f2f; font-size: 0.95rem; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎟 Скретч-карта</h1>
    <p>Потри, чтобы открыть подарок ❤️</p>

    <!-- Тест изображения -->
    <div style="margin:15px 0; padding:10px; background:#f0f0f0; border-radius:8px;">
      <small>Тест загрузки фото:</small><br>
      <img src="img/scratch-reward.jpg" width="180" style="border:2px solid #ccc; border-radius:8px;" alt="test">
    </div>

    <div class="scratch-container">
      <canvas id="scratchCanvas" width="400" height="260"></canvas>
    </div>

    <button onclick="resetScratch()" style="margin-top:15px; padding:10px 20px;">Стереть заново</button>
  </div>

  <script>
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const bgImage = new Image();
    bgImage.src = 'img/scratch-reward.jpg';

    bgImage.onload = () => {
      console.log('✅ Изображение успешно загружено');
      ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
      addScratchLayer();
    };

    bgImage.onerror = () => {
      console.log('❌ Ошибка загрузки изображения');
      ctx.fillStyle = '#fce4ec';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e83e8c';
      ctx.font = 'bold 24px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Фото не найдено', canvas.width/2, canvas.height/2 - 20);
      ctx.font = '16px system-ui';
      ctx.fillText('Проверь папку img/', canvas.width/2, canvas.height/2 + 20);
    };

    function addScratchLayer() {
      ctx.fillStyle = '#c9b3a0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = 'white';
      ctx.font = 'bold 32px system-ui';
      ctx.fillText('???', canvas.width/2, canvas.height/2);
    }

    // === Скретч логика ===
    let isDrawing = false;

    function scratch(x, y) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, 25, 0, Math.PI * 2);
      ctx.fill();
    }

    canvas.addEventListener('mousedown', e => { isDrawing = true; scratchEvent(e); });
    canvas.addEventListener('mousemove', e => { if(isDrawing) scratchEvent(e); });
    canvas.addEventListener('mouseup', () => isDrawing = false);

    canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; scratchEvent(e.touches[0]); });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if(isDrawing) scratchEvent(e.touches[0]); });
    canvas.addEventListener('touchend', () => isDrawing = false);

    function scratchEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      scratch(x, y);
    }

    function resetScratch() {
      if (bgImage.complete && bgImage.naturalWidth > 0) {
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
        addScratchLayer();
      } else {
        bgImage.onerror();
      }
    }
  </script>
</body>
</html>
