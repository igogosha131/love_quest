<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Твой Секретный Подарок</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --accent: #e83e8c;
      --text: #333;
      --card: #fff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
      background: var(--bg);
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/background.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
    }

    .container {
      background: var(--card);
      padding: 2rem 1.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      max-width: 460px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 1.85rem;
      margin-bottom: 0.8rem;
      color: var(--accent);
      line-height: 1.3;
    }

    p {
      line-height: 1.65;
      color: #444;
      margin-bottom: 1.2rem;
    }

    .scratch-container {
      margin: 1.5rem auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      position: relative;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      touch-action: none;
      border-radius: 16px;
    }

    .instruction {
      font-size: 1.05rem;
      color: var(--accent);
      margin: 1rem 0;
      font-weight: 500;
    }

    .reset-btn {
      margin-top: 1.2rem;
      padding: 12px 28px;
      background: #fff;
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .next-btn {
      margin-top: 1rem;
      padding: 16px 40px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(232, 62, 140, 0.3);
    }

    .revealed {
      margin-top: 1rem;
      padding: 1.2rem;
      background: #fdf2f7;
      border-radius: 12px;
      font-size: 1.1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎟 Скретч-карта</h1>
    <p>Потри пальцем или мышкой, чтобы открыть свой подарок ❤️</p>

    <div class="scratch-container">
      <canvas id="scratchCanvas" width="400" height="260"></canvas>
    </div>

    <div class="instruction">👆 Проведи пальцем, чтобы стереть слой</div>

    <button class="reset-btn" onclick="resetScratch()">⟳ Стереть заново</button>

    <div id="revealedText" class="revealed" style="display: none;">
      <strong>Поздравляю, любимая!</strong><br><br>
      Ты открыла главный подарок — <strong>поездка вдвоём на выходные</strong> в июне! ✨<br><br>
      Я уже всё забронировал ❤️
    </div>

    <button class="next-btn" onclick="goToNext()" style="display: none;" id="nextButton">
      Продолжить квест →
    </button>
  </div>

  <script>
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const revealedText = document.getElementById('revealedText');
    const nextButton = document.getElementById('nextButton');

    let isDrawing = false;
    let scratchedPercent = 0;

    // Загружаем изображение под скретч-слоем
    const bgImage = new Image();
    bgImage.src = 'img/scratch-reward.jpg';   // ← Замени на своё фото/картинку

    bgImage.onload = () => {
      ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

      // Накладываем серый скретч-слой
      ctx.fillStyle = '#e0d0c0';           // цвет покрытия
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Добавляем текст поверх покрытия
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 28px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('???', canvas.width/2, canvas.height/2 - 20);

      ctx.font = '18px system-ui';
      ctx.fillText('Потри меня!', canvas.width/2, canvas.height/2 + 25);
    };

    function getXY(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      return { x, y };
    }

    function scratch(x, y) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, Math.PI * 2);
      ctx.fill();

      // Подсчёт процента открытия (примерно)
      if (Math.random() < 0.1) { // проверяем не каждый раз
        checkRevealed();
      }
    }

    function checkRevealed() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let transparentPixels = 0;

      for (let i = 3; i < imageData.data.length; i += 4) {
        if (imageData.data[i] < 50) transparentPixels++;
      }

      scratchedPercent = (transparentPixels / (canvas.width * canvas.height)) * 100;

      if (scratchedPercent > 45) {   // 45% достаточно, чтобы открыть
        revealedText.style.display = 'block';
        nextButton.style.display = 'block';
      }
    }

    // Мышь
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(...Object.values(getXY(e))); });
    canvas.addEventListener('mousemove', (e) => {
      if (isDrawing) scratch(...Object.values(getXY(e)));
    });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);

    // Touch (для телефона)
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      isDrawing = true;
      scratch(...Object.values(getXY(e)));
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (isDrawing) scratch(...Object.values(getXY(e)));
    });
    canvas.addEventListener('touchend', () => isDrawing = false);

    function resetScratch() {
      ctx.globalCompositeOperation = 'source-over';
      ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#e0d0c0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 28px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('???', canvas.width/2, canvas.height/2 - 20);
      ctx.font = '18px system-ui';
      ctx.fillText('Потри меня!', canvas.width/2, canvas.height/2 + 25);

      revealedText.style.display = 'none';
      nextButton.style.display = 'none';
      scratchedPercent = 0;
    }

    function goToNext() {
      // Замени на нужную следующую страницу
      window.location.href = 'step3.html';
    }
  </script>
</body>
</html>
