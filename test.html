<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Что Где Когда?</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --accent: #e83e8c;
      --text: #333;
      --card: #fff;
      --progress-bg: #eee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/background.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
    }

    .container {
      background: var(--card);
      padding: 2rem 1.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    h1 { font-size: 1.75rem; margin-bottom: 0.4rem; color: var(--accent); }
    .subtitle { color: #666; font-size: 1rem; margin-bottom: 1.8rem; }

    /* Плеер */
    .player {
      background: #fafafa;
      border-radius: 16px;
      padding: 1.4rem 1.2rem;
      margin-bottom: 2rem;
    }

    .time { display: flex; justify-content: space-between; font-size: 12.5px; color: #888; margin-bottom: 0.6rem; }

    .progress-container {
      width: 100%; height: 7px; background: var(--progress-bg); border-radius: 4px;
      margin: 0.8rem 0; cursor: pointer; position: relative; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); width: 0%; border-radius: 4px;
      transition: width 0.1s linear;
    }

    .controls {
      display: flex; align-items: center; justify-content: center; gap: 32px; margin-top: 0.8rem;
    }
    .btn {
      background: none; border: none; cursor: pointer; color: var(--accent);
      transition: transform 0.15s ease;
    }
    .btn-play {
      width: 62px; height: 62px; border-radius: 50%; background: var(--accent); color: #fff;
      font-size: 1.65rem; box-shadow: 0 5px 18px rgba(232, 62, 140, 0.4);
    }

    /* Ввод ответа */
    .answer-input {
      width: 100%;
      padding: 16px 18px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 14px;
      margin: 1.5rem 0;
      outline: none;
    }
    .answer-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(232, 62, 140, 0.1);
    }

    .submit-btn {
      padding: 15px 40px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 10px;
    }

    .feedback {
      margin: 1.4rem 0;
      font-size: 1.15rem;
      min-height: 1.8em;
    }

    .btn-continue {
      padding: 14px 36px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Что Где Когда?</h1>
    <p class="subtitle">Прослушай вопрос и напиши ответ</p>

    <!-- Плеер -->
    <div class="player">
      <audio id="audio" preload="auto">
        <source src="audio/chgk.mp3" type="audio/mpeg">
      </audio>

      <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="controls">
        <button class="btn" onclick="skip(-10)">⤆</button>
        <button class="btn btn-play" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="btn" onclick="skip(10)">⤇</button>
      </div>
    </div>

    <div class="quiz-container">
      <p class="question" id="questionText">Напиши название фильма/места, о котором идёт речь:</p>

      <input type="text" id="answerInput" class="answer-input" placeholder="Введи ответ..." autocomplete="off">

      <button class="submit-btn" onclick="checkAnswer()">Проверить ответ</button>

      <div class="feedback" id="feedback"></div>

      <button class="btn-continue" id="continueBtn" onclick="goToNext()">
        Перейти к следующему этапу →
      </button>
    </div>
  </div>

  <script>
    // ==================== ПЛЕЕР ====================
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressFill = document.getElementById('progressFill');
    const progressContainer = document.getElementById('progressContainer');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function updateProgress() {
      const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      progressFill.style.width = `${percent}%`;
      currentTimeEl.textContent = formatTime(audio.currentTime);
    }

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });
    audio.addEventListener('timeupdate', updateProgress);

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playBtn.innerHTML = '❚❚';
      } else {
        audio.pause();
        playBtn.innerHTML = '▶';
      }
    }

    function skip(seconds) {
      audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + seconds));
    }

    progressContainer.addEventListener('click', (e) => {
      const rect = progressContainer.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      audio.currentTime = percent * audio.duration;
    });

    // ==================== ПРОВЕРКА ОТВЕТА ====================
    function normalize(str) {
      return str
        .toLowerCase()
        .trim()
        .replace(/ё/g, 'е')
        .replace(/[^а-яa-z0-9\s]/g, '')
        .replace(/\s+/g, ' ');
    }

    function checkAnswer() {
      const input = document.getElementById('answerInput');
      const feedback = document.getElementById('feedback');
      const continueBtn = document.getElementById('continueBtn');

      const userAnswer = normalize(input.value);

      const correctVariants = [
        "елки 1914", "елки1914", "ёлки 1914", "ёлки1914",
        "елки", "ёлки"
      ];

      const isCorrect = correctVariants.some(variant => normalize(variant) === userAnswer);

      if (isCorrect) {
        feedback.innerHTML = `<span style="color:#4ade80">✅ Правильно! Молодец ❤️</span>`;
        continueBtn.style.display = 'inline-block';
      } else {
        feedback.innerHTML = `<span style="color:#ff6b6b">❌ Неправильно. Попробуй ещё раз.</span>`;
      }
    }

    function goToNext() {
      window.location.href = "quiz3.html";
    }

    // Автозапуск аудио (по желанию)
    window.addEventListener('load', () => {
      audio.play().then(() => {
        playBtn.innerHTML = '❚❚';
      }).catch(() => {});
    });
  </script>
</body>
</html>
