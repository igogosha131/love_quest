<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Секретная страница</title>
  <style>
    :root { --bg: #f8f9fa; --accent: #e83e8c; --text: #333; --card: #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 480px; width: 100%; text-align: center; }
    h2 { margin-bottom: 1.5rem; color: var(--accent); }

    /* Поля для 6 цифр */
    .code-inputs { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
    .code-inputs input { width: 48px; height: 56px; font-size: 24px; text-align: center; border: 2px solid #ddd; border-radius: 10px; outline: none; transition: all 0.2s; background: #fff; }
    .code-inputs input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232, 62, 140, 0.15); }
    .code-inputs input.filled { border-color: #aaa; background: #f1f3f4; }

    button { padding: 12px 24px; font-size: 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }

    #result { margin-top: 1.5rem; display: none; }
    #result img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .error { color: #d93025; margin-top: 12px; display: none; font-size: 14px; min-height: 20px; }
    .hint { margin-top: 1rem; font-size: 13px; color: #666; }

    /* Скрытые элементы после успеха */
    .input-section.hidden, .error.hidden { display: none; }

    .back-link { display: inline-block; margin-top: 1.5rem; color: #555; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Заголовок тоже скроется после успеха -->
    <h2 id="pageHeader">🔐 Введи код доступа</h2>

    <div class="input-section" id="inputSection">
      <div class="code-inputs">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="0" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="1" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="2" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="3" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="4" autocomplete="one-time-code">
        <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="digit" data-index="5" autocomplete="one-time-code">
      </div>
      <button onclick="checkCode()">Открыть</button>
      <p class="error" id="errorMsg"></p>
    </div>

    <div id="result">
      <!-- Замени src на путь к твоему фото -->
      <img src="img/secret_photo.jpg" alt="Секретное фото">
      <p class="hint" style="margin-top: 12px;">Ты нашла то, что искала ❤️</p>
    </div>

    <!-- Ссылка назад: закомментирована, раскомментируй при необходимости -->
    <!-- <a href="index.html" class="back-link">← Вернуться к началу квеста</a> -->
  </div>

  <script>
    const CORRECT_CODE = '123456'; // ← ЗАМЕНИ НА СВОЙ 6-ЗНАЧНЫЙ КОД

    const digits = document.querySelectorAll('.digit');
    const errorMsg = document.getElementById('errorMsg');

    // Сброс ошибки при новом вводе
    function resetError() {
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
    }

    // Авто-переход при вводе цифры
    digits.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, ''); // только цифры
        e.target.value = val;
        if (val && index < digits.length - 1) {
          digits[index + 1].focus();
        }
        e.target.classList.toggle('filled', !!val);
        resetError(); // сброс ошибки при любом вводе
      });

      // Навигация клавишами
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          digits[index - 1].focus();
        }
        if (e.key === 'ArrowLeft' && index > 0) {
          digits[index - 1].focus();
        }
        if (e.key === 'ArrowRight' && index < digits.length - 1) {
          digits[index + 1].focus();
        }
      });

      // Вставка кода из буфера
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        if (paste.length === 6) {
          paste.split('').forEach((char, i) => {
            if (digits[i]) digits[i].value = char;
          });
          digits[5].focus();
          resetError();
        }
      });
    });

    // Поддержка Enter на последнем поле
    digits[5].addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkCode();
    });

    function getCode() {
      return Array.from(digits).map(inp => inp.value).join('');
    }

    function checkCode() {
      const input = getCode();
      const result = document.getElementById('result');
      const inputSection = document.getElementById('inputSection');
      const header = document.getElementById('pageHeader');

      // Логика сообщений об ошибке
      if (input.length < 6) {
        errorMsg.textContent = 'Введи все 6 цифр 🔢';
        errorMsg.style.display = 'block';
        return;
      }

      if (input === CORRECT_CODE) {
        // Успех: скрываем ВСЁ, кроме результата
        inputSection.classList.add('hidden');
        header.style.display = 'none';
        errorMsg.style.display = 'none';
        result.style.display = 'block';
      } else {
        // Ошибка: 6 цифр, но неверные
        errorMsg.textContent = 'Неверный код. Попробуй ещё раз 💔';
        errorMsg.style.display = 'block';

        // Очищаем поля и возвращаем фокус
        digits.forEach(inp => {
          inp.value = '';
          inp.classList.remove('filled');
        });
        digits[0].focus();
      }
    }

    // Фокус на первое поле при загрузке
    window.addEventListener('load', () => digits[0].focus());
  </script>
</body>
</html>
