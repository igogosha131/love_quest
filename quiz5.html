<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финал</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --accent: #e83e8c;
      --text: #333;
      --card: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/background.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      z-index: -1;
    }

    .container {
      background: var(--card);
      padding: 2rem 1.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-size: 1.6rem;
    }

    img {
      max-width: 100%;
      border-radius: 16px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      margin-bottom: 1.2rem;
    }

    .hint {
      font-size: 1.25rem;
      color: var(--accent);
      line-height: 1.5;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1> Любимая, ты прошла викторину ❤️</h1>

    <img src="img/bell.jpg" alt="Колокол">

    <p class="hint">Ты почти у финала! Пройди к колоколу и обязательно позвони в него 3 раза, около него будет лежать следующая подсказка<br>
    <br>Я очень тебя люблю!</p>
  </div>
</body>
</html>
